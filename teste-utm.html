<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YouTube Traffic Simulation - Stoic Reset</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #000; color: white; }
        .box { border: 1px solid #333; padding: 30px; border-radius: 15px; display: inline-block; background: #111; }
        .btn { background: #f3b01c; color: black; padding: 18px 35px; text-decoration: none; font-weight: bold; border-radius: 8px; display: inline-block; margin-top: 25px; font-size: 1.2rem; transition: 0.3s; }
        .btn:hover { background: #ffc13b; scale: 1.05; }
        .debug-info { margin-top: 30px; padding: 15px; background: #222; border-radius: 8px; text-align: left; font-family: monospace; font-size: 0.85rem; border-left: 4px solid #ff0000; }
        .highlight { color: #f3b01c; font-weight: bold; }
        .source-tag { background: #ff0000; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; vertical-align: middle; }
    </style>
</head>
<body>

    <div class="box">
        <span class="source-tag">SIMULATED: YOUTUBE</span>
        <h2>Stoic Reset - Sales Page</h2>
        <p>This page is now identifying you as a <b class="highlight">YouTube viewer</b>.</p>
        
        <a href="https://hictorn.gumroad.com/l/the-power-of-not-reacting" id="buy-button" class="btn">
            GET INSTANT ACCESS
        </a>

        <div class="debug-info">
            <div><span class="highlight">Status:</span> Tracking Active</div>
            <div style="margin-top:10px;"><span class="highlight">Data sent to Gumroad:</span><br>
            <span id="current-link" style="color: #00ff00; word-break: break-all;"></span></div>
        </div>
    </div>

    <script>
        window.addEventListener('load', function() {
            // Pega o botão
            const buyButton = document.getElementById('buy-button');
            const linkDisplay = document.getElementById('current-link');

            // SIMULAÇÃO: Se não houver UTM na URL, nós forçamos 'youtube'
            const urlParams = new URLSearchParams(window.location.search);
            let utmSource = urlParams.get('utm_source') || 'youtube'; // Aqui está a simulação fixa
            
            let originalHref = buyButton.getAttribute('href');
            
            // Adiciona a UTM ao link do botão (seja a real ou a simulada)
            let newHref = originalHref + (originalHref.includes('?') ? '&' : '?') + 'utm_source=' + utmSource;
            
            // Aplica a mudança
            buyButton.setAttribute('href', newHref);
            linkDisplay.innerText = newHref;

            console.log("UTM Tracking injected: " + utmSource);
        });
    </script>
</body>
</html>
